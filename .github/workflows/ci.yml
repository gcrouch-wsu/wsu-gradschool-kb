name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # HAS_DB is a string "true"/"false" derived from the secret. Secrets cannot be
    # referenced directly in step `if:` conditions, but a job-level env var can be —
    # and crucially we do NOT put DATABASE_URL in the job env (that would make the
    # in-memory `npm test` run see a live database). It is set only on the db step.
    env:
      HAS_DB: ${{ secrets.DATABASE_URL != '' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Node 24 (current LTS) matches @types/node 24 and the Next 16 / Vercel
          # default production runtime, so CI validates on the same major we ship on.
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Unit tests (in-memory; KI-1 DB tests self-skip)
        run: npm test

      - name: Build app for accessibility smoke tests
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Public accessibility smoke tests (axe)
        run: npm run test:a11y

      # Editor regression suite (FB-25). Its Playwright config starts a production
      # server (`next build && next start`) — see playwright.editor.config.ts for why
      # dev mode cannot host it — and forces an empty DATABASE_URL so the run stays
      # hermetic (in-memory seed data), matching the in-memory `npm test` job above.
      # This intentionally rebuilds rather than reusing the a11y build: the editor
      # server needs bootstrap-admin env + empty DATABASE_URL, so sharing one build
      # /server with the axe smoke step would be more fragile than a second build.
      - name: Editor regression tests (Playwright, production server)
        run: npm run test:editor

      # Live-database integration suite (KI-1). Runs only when a DATABASE_URL secret
      # is configured — point it at a dedicated Neon TEST branch, never production.
      # Add it under: GitHub repo → Settings → Secrets and variables → Actions.
      - name: Live-DB integration tests (Neon)
        if: env.HAS_DB == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run test:db
